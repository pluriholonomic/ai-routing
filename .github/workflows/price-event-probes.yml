name: price-event-probes

# Successful public captures trigger planning while their final 5-minute menu is
# still inside the freshness gate. Hash-linked delayed jobs cover the frozen
# +15m and +60m waves; the hourly schedule recovers the wider +6h/+24h waves.
# Manual runs remain no-spend and every paid job is separately feature-gated.
on:
  workflow_run:
    workflows: ["capture"]
    types: [completed]
  schedule:
    - cron: "43 * * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  plan:
    if: >-
      ${{ github.event_name != 'workflow_run' ||
          github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      has_tasks: ${{ steps.gates.outputs.has_tasks }}
      has_near_waves: ${{ steps.gates.outputs.has_near_waves }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: hydrate authoritative spend ledger
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python - <<'PY'
          import shutil
          from pathlib import Path
          from orcap.hf_snapshot_retry import snapshot_download_retry

          snapshot = snapshot_download_retry(
              "t4run/openrouter-market-history",
              repo_type="dataset",
              allow_patterns=["curated/paid_spend_ledger/*/*.parquet"],
              max_workers=8,
              stale_if_error=False,
          )
          if Path(snapshot).exists():
              shutil.copytree(snapshot, "input-data", dirs_exist_ok=True)
          else:
              Path("input-data").mkdir(parents=True, exist_ok=True)
          PY
      - name: overlay recent public capture artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/assemble_price_artifacts.sh 3 input-data event
      - name: stage only the spend ledger into the immutable plan bundle
        run: |
          mkdir -p plan-data/curated
          if [ -d input-data/curated/paid_spend_ledger ]; then
            cp -R input-data/curated/paid_spend_ledger plan-data/curated/
          fi
      - name: detect public events and freeze due wave assignments
        env:
          ORCAP_PRICE_EVENT_RUN_ID: github-${{ github.run_id }}
          ORCAP_PRICE_EVENT_SEED: ${{ github.run_id }}
        run: >-
          uv run python -m orcap.capture_price_events plan
          --data-root input-data
          --output-root plan-data
          --bundle price-event-plan.json
          --max-tasks 24
      - name: upload immutable event and assignment plan
        uses: actions/upload-artifact@v4
        with:
          name: price-event-plan-${{ github.run_id }}
          path: |
            price-event-plan.json
            plan-data/
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
          overwrite: true
      - name: publish outcome-free wave gates
        id: gates
        run: |
          echo "has_tasks=$(jq -r '.summary.planned_tasks > 0' price-event-plan.json)" >> "$GITHUB_OUTPUT"
          echo "has_near_waves=$(jq -r '.summary.new_wave_rows > 0' price-event-plan.json)" >> "$GITHUB_OUTPUT"

  execute:
    needs: plan
    if: >-
      ${{ (github.event_name == 'schedule' ||
           (github.event_name == 'workflow_run' &&
            github.event.workflow_run.conclusion == 'success')) &&
          needs.plan.outputs.has_tasks == 'true' &&
          vars.ORCAP_PAID_PRICE_STUDIES_ENABLED == 'true' &&
          (vars.ORCAP_PAID_PRICE_EVENTS_ENABLED == '' ||
           vars.ORCAP_PAID_PRICE_EVENTS_ENABLED == 'true') }}
    concurrency:
      group: randomized-routing-probes
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - uses: actions/download-artifact@v4
        with:
          name: price-event-plan-${{ github.run_id }}
      - name: recover prior attempts from a retried execution job
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p prior-execution plan-data/curated/paid_spend_ledger
          gh run download "${{ github.run_id }}" \
            --pattern "price-event-execution-*-${{ github.run_id }}-*" \
            --dir prior-execution || true
          find prior-execution -type d -name paid_spend_ledger -print0 | \
            while IFS= read -r -d '' ledger; do
              cp -R "$ledger"/. plan-data/curated/paid_spend_ledger/
            done
      - name: verify uploaded wave plan and execute due tasks
        env:
          OPENROUTER_PRICE_EXPERIMENT_KEY: ${{ secrets.OPENROUTER_PRICE_EXPERIMENT_KEY }}
          ORCAP_PAID_PRICE_STUDIES_ENABLED: ${{ vars.ORCAP_PAID_PRICE_STUDIES_ENABLED }}
          ORCAP_PRICE_CAMPAIGN_START_UTC: ${{ vars.ORCAP_PRICE_CAMPAIGN_START_UTC || '2026-07-20T04:00:00Z' }}
          ORCAP_PRICE_CAMPAIGN_END_UTC: ${{ vars.ORCAP_PRICE_CAMPAIGN_END_UTC || '2026-07-27T04:00:00Z' }}
          ORCAP_PRICE_MAX_RUN_USD: ${{ vars.ORCAP_PRICE_EVENT_MAX_RUN_USD || '1.00' }}
          ORCAP_PRICE_MAX_DAY_USD: ${{ vars.ORCAP_PRICE_MAX_DAY_USD || '25.00' }}
          ORCAP_PRICE_MAX_CAMPAIGN_USD: ${{ vars.ORCAP_PRICE_EVENT_MAX_CAMPAIGN_USD || '60.00' }}
        run: >-
          uv run python -m orcap.capture_price_events execute
          --data-root plan-data
          --bundle price-event-plan.json
      - name: preserve redacted event-wave attempts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-event-execution-base-${{ github.run_id }}-${{ github.run_attempt }}
          path: plan-data/
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0

  plan_w1:
    needs: [plan, execute]
    if: >-
      ${{ github.event_name == 'workflow_run' &&
          needs.plan.outputs.has_near_waves == 'true' &&
          needs.execute.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      has_tasks: ${{ steps.gate.outputs.has_tasks }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - uses: actions/download-artifact@v4
        with:
          name: price-event-plan-${{ github.run_id }}
      - name: recover authoritative attempts from the base wave
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p prior-execution plan-data/curated/paid_spend_ledger
          gh run download "${{ github.run_id }}" \
            --pattern "price-event-execution-*-${{ github.run_id }}-*" \
            --dir prior-execution || true
          find prior-execution -type d -name paid_spend_ledger -print0 | \
            while IFS= read -r -d '' ledger; do
              cp -R "$ledger"/. plan-data/curated/paid_spend_ledger/
            done
      - name: wait for and freeze the immutable W1 menu
        env:
          ORCAP_PRICE_EVENT_RUN_ID: github-${{ github.run_id }}-w1
          ORCAP_PRICE_EVENT_SEED: ${{ github.run_id }}
        run: >-
          uv run python -m orcap.capture_price_events recover
          --data-root plan-data
          --output-root plan-data
          --source-bundle price-event-plan.json
          --bundle price-event-w1-plan.json
          --wave-id w1
          --wait
          --max-wait-seconds 1800
          --max-tasks 24
      - name: upload W1 plan before requests
        uses: actions/upload-artifact@v4
        with:
          name: price-event-w1-plan-${{ github.run_id }}
          path: |
            price-event-w1-plan.json
            plan-data/
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
          overwrite: true
      - name: publish W1 task gate
        id: gate
        run: echo "has_tasks=$(jq -r '.summary.planned_tasks > 0' price-event-w1-plan.json)" >> "$GITHUB_OUTPUT"

  execute_w1:
    needs: plan_w1
    if: ${{ needs.plan_w1.outputs.has_tasks == 'true' }}
    concurrency:
      group: randomized-routing-probes
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - uses: actions/download-artifact@v4
        with:
          name: price-event-w1-plan-${{ github.run_id }}
      - name: verify uploaded W1 plan and execute exactly once
        env:
          OPENROUTER_PRICE_EXPERIMENT_KEY: ${{ secrets.OPENROUTER_PRICE_EXPERIMENT_KEY }}
          ORCAP_PAID_PRICE_STUDIES_ENABLED: ${{ vars.ORCAP_PAID_PRICE_STUDIES_ENABLED }}
          ORCAP_PRICE_CAMPAIGN_START_UTC: ${{ vars.ORCAP_PRICE_CAMPAIGN_START_UTC || '2026-07-20T04:00:00Z' }}
          ORCAP_PRICE_CAMPAIGN_END_UTC: ${{ vars.ORCAP_PRICE_CAMPAIGN_END_UTC || '2026-07-27T04:00:00Z' }}
          ORCAP_PRICE_MAX_RUN_USD: ${{ vars.ORCAP_PRICE_EVENT_MAX_RUN_USD || '1.00' }}
          ORCAP_PRICE_MAX_DAY_USD: ${{ vars.ORCAP_PRICE_MAX_DAY_USD || '25.00' }}
          ORCAP_PRICE_MAX_CAMPAIGN_USD: ${{ vars.ORCAP_PRICE_EVENT_MAX_CAMPAIGN_USD || '60.00' }}
        run: >-
          uv run python -m orcap.capture_price_events execute
          --data-root plan-data
          --bundle price-event-w1-plan.json
      - name: preserve redacted W1 attempts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-event-execution-w1-${{ github.run_id }}-${{ github.run_attempt }}
          path: plan-data/
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0

  plan_w2:
    needs: [plan, plan_w1, execute_w1]
    if: >-
      ${{ always() &&
          github.event_name == 'workflow_run' &&
          needs.plan.outputs.has_near_waves == 'true' &&
          needs.plan_w1.result == 'success' &&
          (needs.execute_w1.result == 'success' ||
           needs.execute_w1.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 70
    outputs:
      has_tasks: ${{ steps.gate.outputs.has_tasks }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - uses: actions/download-artifact@v4
        with:
          name: price-event-plan-${{ github.run_id }}
      - name: recover authoritative attempts from earlier waves
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p prior-execution plan-data/curated/paid_spend_ledger
          gh run download "${{ github.run_id }}" \
            --pattern "price-event-execution-*-${{ github.run_id }}-*" \
            --dir prior-execution || true
          find prior-execution -type d -name paid_spend_ledger -print0 | \
            while IFS= read -r -d '' ledger; do
              cp -R "$ledger"/. plan-data/curated/paid_spend_ledger/
            done
      - name: wait for and freeze the immutable W2 menu
        env:
          ORCAP_PRICE_EVENT_RUN_ID: github-${{ github.run_id }}-w2
          ORCAP_PRICE_EVENT_SEED: ${{ github.run_id }}
        run: >-
          uv run python -m orcap.capture_price_events recover
          --data-root plan-data
          --output-root plan-data
          --source-bundle price-event-plan.json
          --bundle price-event-w2-plan.json
          --wave-id w2
          --wait
          --max-wait-seconds 3600
          --max-tasks 24
      - name: upload W2 plan before requests
        uses: actions/upload-artifact@v4
        with:
          name: price-event-w2-plan-${{ github.run_id }}
          path: |
            price-event-w2-plan.json
            plan-data/
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
          overwrite: true
      - name: publish W2 task gate
        id: gate
        run: echo "has_tasks=$(jq -r '.summary.planned_tasks > 0' price-event-w2-plan.json)" >> "$GITHUB_OUTPUT"

  execute_w2:
    needs: plan_w2
    if: ${{ needs.plan_w2.outputs.has_tasks == 'true' }}
    concurrency:
      group: randomized-routing-probes
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - uses: actions/download-artifact@v4
        with:
          name: price-event-w2-plan-${{ github.run_id }}
      - name: verify uploaded W2 plan and execute exactly once
        env:
          OPENROUTER_PRICE_EXPERIMENT_KEY: ${{ secrets.OPENROUTER_PRICE_EXPERIMENT_KEY }}
          ORCAP_PAID_PRICE_STUDIES_ENABLED: ${{ vars.ORCAP_PAID_PRICE_STUDIES_ENABLED }}
          ORCAP_PRICE_CAMPAIGN_START_UTC: ${{ vars.ORCAP_PRICE_CAMPAIGN_START_UTC || '2026-07-20T04:00:00Z' }}
          ORCAP_PRICE_CAMPAIGN_END_UTC: ${{ vars.ORCAP_PRICE_CAMPAIGN_END_UTC || '2026-07-27T04:00:00Z' }}
          ORCAP_PRICE_MAX_RUN_USD: ${{ vars.ORCAP_PRICE_EVENT_MAX_RUN_USD || '1.00' }}
          ORCAP_PRICE_MAX_DAY_USD: ${{ vars.ORCAP_PRICE_MAX_DAY_USD || '25.00' }}
          ORCAP_PRICE_MAX_CAMPAIGN_USD: ${{ vars.ORCAP_PRICE_EVENT_MAX_CAMPAIGN_USD || '60.00' }}
        run: >-
          uv run python -m orcap.capture_price_events execute
          --data-root plan-data
          --bundle price-event-w2-plan.json
      - name: preserve redacted W2 attempts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-event-execution-w2-${{ github.run_id }}-${{ github.run_attempt }}
          path: plan-data/
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0
