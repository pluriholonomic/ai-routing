name: price-event-probes

# Hourly recovery planning detects public quote events, freezes all wave times,
# and materializes any currently due assignments. Manual runs remain no-spend
# because paid execution is schedule-only and separately feature-gated.
on:
  schedule:
    - cron: "43 * * * *"
  workflow_dispatch:

concurrency:
  group: randomized-routing-probes
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: hydrate authoritative spend ledger
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python - <<'PY'
          import shutil
          from pathlib import Path
          from orcap.hf_snapshot_retry import snapshot_download_retry

          snapshot = snapshot_download_retry(
              "t4run/openrouter-market-history",
              repo_type="dataset",
              allow_patterns=["curated/paid_spend_ledger/*/*.parquet"],
              max_workers=8,
              stale_if_error=False,
          )
          if Path(snapshot).exists():
              shutil.copytree(snapshot, "input-data", dirs_exist_ok=True)
          else:
              Path("input-data").mkdir(parents=True, exist_ok=True)
          PY
      - name: overlay recent public capture artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/assemble_price_artifacts.sh 3 input-data event
      - name: stage only the spend ledger into the immutable plan bundle
        run: |
          mkdir -p plan-data/curated
          if [ -d input-data/curated/paid_spend_ledger ]; then
            cp -R input-data/curated/paid_spend_ledger plan-data/curated/
          fi
      - name: detect public events and freeze due wave assignments
        env:
          ORCAP_PRICE_EVENT_RUN_ID: github-${{ github.run_id }}
          ORCAP_PRICE_EVENT_SEED: ${{ github.run_id }}
        run: >-
          uv run python -m orcap.capture_price_events plan
          --data-root input-data
          --output-root plan-data
          --bundle price-event-plan.json
          --max-tasks 24
      - name: upload immutable event and assignment plan
        uses: actions/upload-artifact@v4
        with:
          name: price-event-plan-${{ github.run_id }}
          path: |
            price-event-plan.json
            plan-data/
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
          overwrite: true

  execute:
    needs: plan
    if: >-
      ${{ github.event_name == 'schedule' &&
          vars.ORCAP_PAID_PRICE_STUDIES_ENABLED == 'true' &&
          vars.ORCAP_PAID_PRICE_EVENTS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - uses: actions/download-artifact@v4
        with:
          name: price-event-plan-${{ github.run_id }}
      - name: recover prior attempts from a retried execution job
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p prior-execution plan-data/curated/paid_spend_ledger
          gh run download "${{ github.run_id }}" \
            --pattern "price-event-execution-${{ github.run_id }}-*" \
            --dir prior-execution || true
          find prior-execution -type d -name paid_spend_ledger -print0 | \
            while IFS= read -r -d '' ledger; do
              cp -R "$ledger"/. plan-data/curated/paid_spend_ledger/
            done
      - name: verify uploaded wave plan and execute due tasks
        env:
          OPENROUTER_PRICE_EXPERIMENT_KEY: ${{ secrets.OPENROUTER_PRICE_EXPERIMENT_KEY }}
          ORCAP_PAID_PRICE_STUDIES_ENABLED: ${{ vars.ORCAP_PAID_PRICE_STUDIES_ENABLED }}
          ORCAP_PRICE_CAMPAIGN_START_UTC: ${{ vars.ORCAP_PRICE_CAMPAIGN_START_UTC }}
          ORCAP_PRICE_CAMPAIGN_END_UTC: ${{ vars.ORCAP_PRICE_CAMPAIGN_END_UTC }}
          ORCAP_PRICE_MAX_RUN_USD: ${{ vars.ORCAP_PRICE_EVENT_MAX_RUN_USD || '1.00' }}
          ORCAP_PRICE_MAX_DAY_USD: ${{ vars.ORCAP_PRICE_MAX_DAY_USD || '25.00' }}
          ORCAP_PRICE_MAX_CAMPAIGN_USD: ${{ vars.ORCAP_PRICE_EVENT_MAX_CAMPAIGN_USD || '60.00' }}
        run: >-
          uv run python -m orcap.capture_price_events execute
          --data-root plan-data
          --bundle price-event-plan.json
      - name: preserve redacted event-wave attempts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-event-execution-${{ github.run_id }}-${{ github.run_attempt }}
          path: plan-data/
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0
