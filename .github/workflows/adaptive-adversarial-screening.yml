name: adaptive-adversarial-screening

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:
    inputs:
      historical_menus:
        description: "Bounded historical-menu count"
        type: number
        default: 5000
        required: true
      simulation_menus:
        description: "Bounded strategic simulation-menu count"
        type: number
        default: 200
        required: true

concurrency:
  group: adaptive-adversarial-screening
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: hydrate endpoint menus at one immutable revision
        id: source
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python - <<'PY'
          import os, shutil
          from pathlib import Path
          from huggingface_hub import HfApi
          from orcap.hf_snapshot_retry import snapshot_download_retry

          repo = "t4run/openrouter-market-history"
          revision = str(HfApi(token=os.environ["HF_TOKEN"]).dataset_info(repo).sha)
          snapshot = snapshot_download_retry(
              repo, repo_type="dataset", revision=revision,
              allow_patterns=["curated/endpoints_snapshots/*/*.parquet"],
              max_workers=12, stale_if_error=False,
          )
          shutil.copytree(snapshot, "input-data", dirs_exist_ok=True)
          Path("hf-revision.txt").write_text(revision + "\n", encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"revision={revision}\n")
          PY
      - name: historical adversarial replay
        run: >-
          uv run python -m orcap.analysis.adaptive_adversarial_replay
          --data-root input-data
          --output-dir data/analysis/adaptive-router-adversarial
          --max-menus ${{ inputs.historical_menus || 5000 }}
          --max-attack-providers 4
          --bootstrap-draws 1000
      - name: calibrated strategic screening
        run: >-
          uv run python -m orcap.analysis.adaptive_adversarial_simulation
          --data-root input-data
          --output-dir data/analysis/adaptive-router-adversarial-simulation
          --max-menus ${{ inputs.simulation_menus || 200 }}
          --learning-menus 8
          --learning-steps 2000
          --learning-seeds 10
          --q-learning-epochs 100000
      - name: synthesize evidence-bounded scorecard
        run: >-
          uv run python -m orcap.analysis.adaptive_adversarial_report
          --source-revision "${{ steps.source.outputs.revision }}"
      - name: preserve immutable source revision
        run: |
          cp hf-revision.txt data/analysis/adaptive-router-adversarial/
          cp hf-revision.txt data/analysis/adaptive-router-adversarial-simulation/
          cp hf-revision.txt data/analysis/adaptive-router-adversarial-scorecard/
      - name: publish screening outputs
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run orcap push --message "adaptive adversarial screening ${{ github.run_id }}"
      - name: preserve screening artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-adversarial-screening-${{ github.run_id }}
          path: |
            data/analysis/adaptive-router-adversarial/
            data/analysis/adaptive-router-adversarial-simulation/
            data/analysis/adaptive-router-adversarial-scorecard/
          if-no-files-found: warn
          retention-days: 30

