name: decomposition-replication

# H95 is a fixed 120-triplet replication over ranked Hugging Face-linked
# candidates below the H80/H81 support. Each accepted triplet sends nine
# one-token requests and contributes exactly one first-position block per arm.
on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

concurrency:
  # Serialize all owned OpenRouter randomized experiments. Delayed cron starts
  # cannot then create cross-study request overlap.
  group: randomized-routing-probes
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  probes:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: run fixed-horizon delegation replication
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run python -m orcap.capture_decomposition_replication
      - name: preserve eligibility and attempt telemetry
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decomposition-replication-${{ github.run_id }}
          path: data/
          retention-days: 7
          compression-level: 0
