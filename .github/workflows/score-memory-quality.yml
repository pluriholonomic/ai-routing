name: score-memory-quality

on:
  schedule:
    - cron: "43 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      execute_paid:
        description: "Execute the uploaded score-memory quality plan after all gates"
        type: boolean
        required: true
        default: false

permissions:
  actions: read
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: hydrate authoritative paid-spend ledger
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python - <<'PY'
          import shutil
          from pathlib import Path
          from orcap.hf_snapshot_retry import snapshot_download_retry

          snapshot = snapshot_download_retry(
              "t4run/openrouter-market-history",
              repo_type="dataset",
              allow_patterns=[
                  "curated/paid_spend_ledger/*/*.parquet",
                  "curated/score_memory_quality/*/*.parquet",
              ],
              max_workers=8,
              stale_if_error=False,
          )
          if Path(snapshot).exists():
              shutil.copytree(snapshot, "input-data", dirs_exist_ok=True)
          else:
              Path("input-data").mkdir(parents=True, exist_ok=True)
          PY
      - name: overlay uncompacted quality spend checkpoints
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/assemble_price_artifacts.sh 48 input-data score-memory-quality
      - name: stage only spend history into immutable execution directory
        run: |
          mkdir -p plan-data/curated
          if [ -d input-data/curated/paid_spend_ledger ]; then
            cp -R input-data/curated/paid_spend_ledger plan-data/curated/
          fi
      - name: freeze public menu, benchmark items, and all assignments
        env:
          ORCAP_SCORE_MEMORY_QUALITY_RUN_ID: github-${{ github.run_id }}
          ORCAP_SCORE_MEMORY_QUALITY_SEED: ${{ github.run_id }}
        run: >-
          uv run python -m orcap.capture_score_memory_quality plan
          --bundle score-memory-quality-plan.json
          --curated-dir plan-data/curated
          --data-root input-data
      - name: upload immutable assignment-only plan
        uses: actions/upload-artifact@v4
        with:
          name: score-memory-quality-plan-${{ github.run_id }}
          path: |
            score-memory-quality-plan.json
            plan-data/
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
          overwrite: true
      - name: validate source, manifest, item hashes, and task count
        run: >-
          uv run python -m orcap.capture_score_memory_quality validate-plan
          --bundle score-memory-quality-plan.json
          --require-tasks

  execute:
    needs: plan
    if: >-
      ${{ vars.ORCAP_PAID_PRICE_STUDIES_ENABLED == 'true' &&
          vars.ORCAP_SCORE_MEMORY_QUALITY_ENABLED == 'true' &&
          (github.event_name == 'schedule' || github.event.inputs.execute_paid == 'true') }}
    concurrency:
      group: randomized-routing-probes
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - uses: actions/download-artifact@v4
        with:
          name: score-memory-quality-plan-${{ github.run_id }}
      - name: recover prior spend checkpoint from a retried execution job
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p prior-execution plan-data/curated/paid_spend_ledger
          gh run download "${{ github.run_id }}" \
            --pattern "score-memory-quality-execution-${{ github.run_id }}-*" \
            --dir prior-execution || true
          find prior-execution -type d -name paid_spend_ledger -print0 | \
            while IFS= read -r -d '' ledger; do
              cp -R "$ledger"/. plan-data/curated/paid_spend_ledger/
            done
      - name: verify uploaded plan and execute exactly once
        env:
          OPENROUTER_PRICE_EXPERIMENT_KEY: ${{ secrets.OPENROUTER_PRICE_EXPERIMENT_KEY }}
          ORCAP_PAID_PRICE_STUDIES_ENABLED: ${{ vars.ORCAP_PAID_PRICE_STUDIES_ENABLED }}
          ORCAP_SCORE_MEMORY_QUALITY_ENABLED: ${{ vars.ORCAP_SCORE_MEMORY_QUALITY_ENABLED }}
          ORCAP_SCORE_MEMORY_QUALITY_START_UTC: ${{ vars.ORCAP_SCORE_MEMORY_QUALITY_START_UTC }}
          ORCAP_SCORE_MEMORY_QUALITY_END_UTC: ${{ vars.ORCAP_SCORE_MEMORY_QUALITY_END_UTC }}
          ORCAP_SCORE_MEMORY_QUALITY_MAX_RUN_USD: ${{ vars.ORCAP_SCORE_MEMORY_QUALITY_MAX_RUN_USD || '0.25' }}
          ORCAP_SCORE_MEMORY_QUALITY_MAX_DAY_USD: ${{ vars.ORCAP_SCORE_MEMORY_QUALITY_MAX_DAY_USD || '2.00' }}
          ORCAP_SCORE_MEMORY_QUALITY_MAX_CAMPAIGN_USD: ${{ vars.ORCAP_SCORE_MEMORY_QUALITY_MAX_CAMPAIGN_USD || '30.00' }}
        run: >-
          uv run python -m orcap.capture_score_memory_quality execute
          --bundle score-memory-quality-plan.json
          --curated-dir plan-data/curated
      - name: preserve redacted quality rows and spend ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: score-memory-quality-execution-${{ github.run_id }}-${{ github.run_attempt }}
          path: plan-data/
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0
