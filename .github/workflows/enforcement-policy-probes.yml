name: enforcement-policy-probes
# H88 snapshots quotes and public five-minute router enforcement counts before
# assignment, then sends exactly one randomized one-token request per eligible
# model block. Candidates are outcome-free; route attempts remain private.

on:
  schedule:
    - cron: "22 * * * *"
  workflow_dispatch:

concurrency:
  # Share the probe lock with H80/H81/H87. Serialization protects the
  # first-and-only estimand against delayed Actions schedules.
  group: randomized-routing-probes
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  probes:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: run randomized public-enforcement policy trial
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run python -m orcap.capture_enforcement_policy_probes
      - name: buffer outcome-free candidates and private attempts
        uses: actions/upload-artifact@v4
        with:
          name: enforcement-policy-probes-${{ github.run_id }}
          path: data/
          retention-days: 7
          compression-level: 0
