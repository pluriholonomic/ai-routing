name: capture
# GitHub throttles sub-hourly crons on this repo to ~1 firing/hour (observed
# 2026-07-07), so each hourly run takes 11 API snapshots at 5-min spacing
# (OpenRouter's finest rolling window is uptime_last_5m) — a ~55-min job that
# reconstructs a 5-minute series from the one slot the scheduler grants.
# run_ts timestamps in the data are authoritative; hour-boundary gaps are fine.

on:
  schedule:
    - cron: "7 * * * *"  # off the congested :00 mark
  workflow_dispatch:
    inputs:
      samples:
        description: "snapshots this run"
        default: "11"

concurrency:
  group: capture
  cancel-in-progress: false

permissions:
  actions: write  # lets a detected price event trigger the memo reanalysis
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: capture snapshots
        run: uv run orcap capture --samples "${{ github.event.inputs.samples || '11' }}" --interval-seconds 300
      - name: validate capture source health
        run: uv run orcap quality --profile capture
      - name: buffer output as workflow artifact (HF gets one consolidated push nightly)
        uses: actions/upload-artifact@v4
        with:
          name: capture-${{ github.run_id }}
          path: data/
          retention-days: 7
          compression-level: 0
      - name: trigger reanalysis on price events
        if: ${{ hashFiles('events_detected') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "price events on: $(cat events_detected)"
          gh workflow run memo.yml --repo ${{ github.repository }}
