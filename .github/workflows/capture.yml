name: capture
# GitHub throttles sub-hourly crons on this repo to ~1 firing/hour (observed
# 2026-07-07), so each hourly run takes 11 API snapshots at 5-min spacing
# (OpenRouter's finest rolling window is uptime_last_5m) — a ~55-min job that
# reconstructs a 5-minute series from the one slot the scheduler grants.
# run_ts timestamps in the data are authoritative; hour-boundary gaps are fine.

on:
  schedule:
    - cron: "7 * * * *"  # off the congested :00 mark
  workflow_dispatch:
    inputs:
      samples:
        description: "snapshots this run"
        default: "11"

concurrency:
  group: capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: capture snapshots
        run: uv run orcap capture --samples "${{ github.event.inputs.samples || '11' }}" --interval-seconds 300
      - name: push to HF dataset repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run orcap push --message "capture ${{ github.run_id }}" --delete-local
