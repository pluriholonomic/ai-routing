name: capacity-policy-probes
# H87 snapshots quote and operational capacity state before assignment, then
# sends exactly one randomized one-token request per eligible model block.
# Candidate artifacts are outcome-free; route attempts remain private on HF.

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  # Share the probe lock with H80/H81. The nominal offsets are 20 and 35
  # minutes, and serialization protects against delayed Actions schedules.
  group: randomized-routing-probes
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  probes:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: run randomized public-capacity policy trial
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run python -m orcap.capture_capacity_policy_probes
      - name: buffer outcome-free candidates and private attempts
        uses: actions/upload-artifact@v4
        with:
          name: capacity-policy-probes-${{ github.run_id }}
          path: data/
          retention-days: 7
          compression-level: 0

