name: marketplace-history

# Read-only aggregate history.  This workflow sends no inference requests.
# Scheduled runs capture the latest closed UTC day.  Manual runs may backfill
# at most 200 app-ranking days so the OpenRouter account's documented daily
# request limit cannot be exceeded by one job.
on:
  push:
    branches: [main]
    paths:
      - "src/orcap/capture_openrouter_datasets.py"
      - "config/sources.toml"
  schedule:
    - cron: "19 6 * * *"
  workflow_dispatch:
    inputs:
      start_date:
        description: "first UTC source day (YYYY-MM-DD; empty = yesterday)"
        default: ""
      end_date:
        description: "last UTC source day, inclusive (max 200 days)"
        default: ""

concurrency:
  group: marketplace-history
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: resolve requested source dates
        id: dates
        shell: bash
        env:
          DEPLOY_BACKFILL: ${{ contains(github.event.head_commit.message, '[history-backfill]') }}
        run: |
          start="${{ github.event.inputs.start_date }}"
          end="${{ github.event.inputs.end_date }}"
          if [ -z "$start" ]; then
            start=$(date -u -d yesterday +%F)
          fi
          if [ -z "$end" ]; then
            end="$start"
          fi
          echo "start=$start" >> "$GITHUB_OUTPUT"
          echo "end=$end" >> "$GITHUB_OUTPUT"
          backfill_start=""
          backfill_end=""
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$DEPLOY_BACKFILL" = "true" ]; then
            case "$(date -u +%F)" in
              2026-07-13)
                backfill_start="2025-01-01"
                backfill_end="2025-05-28"
                ;;
              2026-07-14)
                # The July 13 run received only the first page for May 28
                # before the source returned a malformed throttle response.
                # Re-request the whole day so top-200 coverage is complete.
                backfill_start="2025-05-28"
                backfill_end="2026-01-13"
                ;;
              2026-07-15)
                backfill_start="2026-01-14"
                backfill_end="2026-07-12"
                ;;
            esac
          fi
          echo "backfill_start=$backfill_start" >> "$GITHUB_OUTPUT"
          echo "backfill_end=$backfill_end" >> "$GITHUB_OUTPUT"
      - name: capture documented model and public-app aggregates
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          uv run orcap capture-openrouter-usage \
            --start-date "${{ steps.dates.outputs.start }}" \
            --end-date "${{ steps.dates.outputs.end }}"
          uv run orcap capture-openrouter-apps \
            --start-date "${{ steps.dates.outputs.start }}" \
            --end-date "${{ steps.dates.outputs.end }}"
      - name: capture scheduled historical chunk
        id: history_capture
        continue-on-error: true
        if: ${{ steps.dates.outputs.backfill_start != '' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          chunk_start="${{ steps.dates.outputs.backfill_start }}"
          final_end="${{ steps.dates.outputs.backfill_end }}"
          while [[ "$chunk_start" < "$final_end" || "$chunk_start" == "$final_end" ]]; do
            chunk_end=$(date -u -d "$chunk_start + 19 days" +%F)
            if [[ "$chunk_end" > "$final_end" ]]; then
              chunk_end="$final_end"
            fi
            echo "capturing history chunk $chunk_start through $chunk_end"
            uv run orcap capture-openrouter-usage \
              --start-date "$chunk_start" \
              --end-date "$chunk_end"
            uv run orcap capture-openrouter-apps \
              --start-date "$chunk_start" \
              --end-date "$chunk_end"
            chunk_start=$(date -u -d "$chunk_end + 1 day" +%F)
          done
      - name: validate aggregate-history source health
        id: quality
        if: always()
        continue-on-error: true
        run: uv run orcap quality --profile marketplace_history --fail-on-degraded
      - name: push immutable raw and curated history
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: >-
          uv run orcap push
          --message "marketplace history ${{ steps.dates.outputs.start }} to ${{ steps.dates.outputs.end }} run ${{ github.run_id }}"
          --delete-local
      - name: enforce capture and quality result after preserving evidence
        if: ${{ steps.history_capture.outcome == 'failure' || steps.quality.outcome == 'failure' }}
        run: exit 1
