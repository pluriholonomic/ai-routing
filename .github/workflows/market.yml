name: market-comparison

# The comparison monitor keeps raw source evidence and status records even when
# optional credentialed feeds are absent. DefiLlama, public Akash provider/lease
# feeds, Chutes deployment-configuration snapshots, public Nosana aggregates,
# Aethir dashboard aggregates, and a dRPC bounded-finality log window run
# without credentials. The public Ethereum fallback is never an archive source;
# USD executable depth, market-wide CoW coverage, and Golem remain visibly
# incomplete.
on:
  schedule:
    - cron: "29 * * * *"
  workflow_dispatch:

concurrency:
  group: market-comparison
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  market-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: capture comparison sources
        env:
          GRAPH_API_KEY: ${{ secrets.GRAPH_API_KEY }}
          ORCAP_UNISWAP_SUBGRAPH_ID: ${{ secrets.ORCAP_UNISWAP_SUBGRAPH_ID }}
          ORCAP_UNISWAP_POOLS: ${{ vars.ORCAP_UNISWAP_POOLS }}
          ORCAP_ETHEREUM_RPC_URL: ${{ secrets.ORCAP_ETHEREUM_RPC_URL }}
          ORCAP_AKASH_NETWORK_URL: ${{ vars.ORCAP_AKASH_NETWORK_URL }}
          AKASH_API_KEY: ${{ secrets.AKASH_API_KEY }}
          ORCAP_COW_TRADES_URL: ${{ vars.ORCAP_COW_TRADES_URL }}
          ORCAP_GOLEM_STATS_URL: ${{ vars.ORCAP_GOLEM_STATS_URL }}
        run: |
          args=(orcap market-capture --with-uniswap --with-akash --with-nosana --with-aethir)
          if [ "$(date -u +%H)" = "03" ]; then
            args+=(--with-akash-provider-aggregates)
          fi
          uv run "${args[@]}"
      - name: validate required source health
        run: uv run orcap quality --profile market
      - name: push comparison data and source-run ledger
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run orcap push --message "market comparison ${{ github.run_id }}" --delete-local
