name: scrape
# Daily capture of the frontend chart APIs: per-model activity (31-day trailing),
# app/harness leaderboards (global + per model), endpoint stats, uptime,
# effective pricing, perf comparisons, weekly rankings history.

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "max model×variant combos (empty = all)"
        default: ""

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: scrape frontend chart APIs
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            uv run orcap scrape --limit "${{ github.event.inputs.limit }}"
          else
            uv run orcap scrape
          fi
      - name: capture direct-provider prices
        run: uv run orcap capture-direct
      - name: capture HF model stats
        run: uv run orcap capture-hf
      - name: capture devrel stats
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run orcap capture-devrel
      - name: push to HF dataset repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run orcap push --message "scrape ${{ github.run_id }}" --delete-local
