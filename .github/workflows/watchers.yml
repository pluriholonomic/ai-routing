name: watchers
# Daily fee/pricing-page snapshots (CBH-17 waterbed trigger, fee-migration
# panel) and lab status-page incidents (CBH-18 capacity-bind windows).
# Artifact-buffered like the other collectors; HF gets the nightly push.

on:
  schedule:
    - cron: "47 6 * * *"
  workflow_dispatch:

concurrency:
  group: watchers
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  watchers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: snapshot fee/pricing pages
        run: uv run python -m orcap.capture_fees
      - name: poll lab status pages
        run: uv run python -m orcap.capture_labstatus
      - name: buffer output as workflow artifact (HF gets one consolidated push nightly)
        uses: actions/upload-artifact@v4
        with:
          name: watchers-${{ github.run_id }}
          path: data/
          retention-days: 7
          compression-level: 0
