name: compact
# Nightly: upload buffered artifacts once, then consolidate every curated
# table through deterministic disjoint shards. The shard owning endpoint
# snapshots also derives SCD-2 pricing_changes + pricing_current.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/compact.yml"
      - "src/orcap/compact.py"
      - "scripts/assemble_artifacts.sh"
      - "experiments/openrouter-price-response-v1/ingest-canary-v1"
  schedule:
    # Run after the UTC-day inputs have landed. The 04:13 slot also gives the
    # remote watchdog time to observe a recovery before its 06:47 check.
    - cron: "13 4 * * *"
  workflow_dispatch:
    inputs:
      dt:
        description: "day to compact (YYYY-MM-DD, empty = yesterday UTC)"
        default: ""

concurrency:
  group: compact
  # Compaction is idempotent for a UTC day and uploads buffered artifacts
  # before the fold. A newer implementation should replace a stale fold rather
  # than wait behind it for up to two hours.
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    # Artifact assembly is bounded by fast-failing expected no-artifact runs,
    # but a full 26-hour capture overlay can still take longer than 45 minutes
    # under GitHub artifact latency.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: run tests
        run: uv run pytest -q
      - name: assemble buffered artifacts and push once to HF
        env:
          GH_TOKEN: ${{ github.token }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ./scripts/assemble_artifacts.sh 26 data
          # Per-run files already uploaded before this migration boundary must
          # remain unbundled to avoid duplicating them. New UTC partitions use
          # one stable object per table/day before their first remote upload.
          uv run python scripts/bundle_curated_artifacts.py \
            --data-dir data --min-dt 2026-07-14
          uv run orcap push --message "daily consolidated push ${{ github.run_id }}" --delete-local

  compact:
    needs: prepare
    runs-on: ubuntu-latest
    # source_runs is only a few MB, but a full day currently consists of more
    # than 600 immutable objects. Hub per-object latency can exceed an hour
    # even though the other shards finish in seconds, so keep that one-time
    # consolidation inside a bounded two-hour job.
    timeout-minutes: 120
    strategy:
      fail-fast: false
      # Hugging Face commits advance one branch. Serialize small shards so a
      # downloader never resolves files against a revision another shard is
      # concurrently replacing; each shard is independently bounded to 120m.
      max-parallel: 1
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: compact disjoint table shard
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: >-
          uv run orcap compact
          --dt "${{ github.event.inputs.dt }}"
          --shard-index "${{ matrix.shard }}"
          --shard-count 8
