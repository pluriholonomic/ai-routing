name: compact
# Nightly: consolidate pricing-critical endpoint snapshots for yesterday and
# derive SCD-2 pricing_changes + pricing_current. Other curated tables remain
# queryable without hydration so the job stays below the Hub file-API quota.

on:
  schedule:
    - cron: "43 1 * * *"
  workflow_dispatch:
    inputs:
      dt:
        description: "day to compact (YYYY-MM-DD, empty = yesterday UTC)"
        default: ""

concurrency:
  group: compact
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  compact:
    runs-on: ubuntu-latest
    # The 2026-07-09 scheduled run was terminated at the old 30-minute job
    # limit while folding the prior day's endpoint history.  A missed fold
    # leaves raw snapshots intact but silently stalls pricing_changes.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: run tests
        run: uv run pytest -q
      - name: assemble buffered artifacts and push once to HF
        env:
          GH_TOKEN: ${{ github.token }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ./scripts/assemble_artifacts.sh 26 data
          uv run orcap push --message "daily consolidated push ${{ github.run_id }}" --delete-local
      - name: compact + derive pricing changes
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.dt }}" ]; then
            uv run python -c "from orcap.compact import main; main(dt='${{ github.event.inputs.dt }}')"
          else
            uv run orcap compact
          fi
