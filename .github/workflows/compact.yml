name: compact
# Nightly: consolidate yesterday's ~100 small parquet files per table into one
# file per table/day in the HF repo, and derive SCD-2 pricing_changes +
# pricing_current from the endpoint snapshots.

on:
  schedule:
    - cron: "43 1 * * *"
  workflow_dispatch:
    inputs:
      dt:
        description: "day to compact (YYYY-MM-DD, empty = yesterday UTC)"
        default: ""

concurrency:
  group: compact
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  compact:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: run tests
        run: uv run pytest -q
      - name: assemble buffered artifacts and push once to HF
        env:
          GH_TOKEN: ${{ github.token }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ./scripts/assemble_artifacts.sh 26 data
          uv run orcap push --message "daily consolidated push ${{ github.run_id }}" --delete-local
      - name: compact + derive pricing changes
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.dt }}" ]; then
            uv run python -c "from orcap.compact import main; main(dt='${{ github.event.inputs.dt }}')"
          else
            uv run orcap compact
          fi
