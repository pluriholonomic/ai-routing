name: market-measurement

# Every invocation freezes and uploads an assignment-only plan before any paid
# request. Manual dispatch is no-spend unless execute_paid is explicitly set.
on:
  schedule:
    - cron: "37 1,7,13,19 * * *"
  workflow_dispatch:
    inputs:
      execute_paid:
        description: "Execute the uploaded plan after all repository and budget gates"
        type: boolean
        required: true
        default: false

concurrency:
  # H95 and the other randomized paid probes use this same lock. Scientific
  # isolation is more important than running at the exact cron minute.
  group: randomized-routing-probes
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: hydrate authoritative spend ledger
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python - <<'PY'
          import shutil
          from pathlib import Path
          from orcap.hf_snapshot_retry import snapshot_download_retry

          snapshot = snapshot_download_retry(
              "t4run/openrouter-market-history",
              repo_type="dataset",
              allow_patterns=["curated/paid_spend_ledger/*/*.parquet"],
              max_workers=8,
              stale_if_error=False,
          )
          if Path(snapshot).exists():
              shutil.copytree(snapshot, "input-data", dirs_exist_ok=True)
          else:
              # The table legitimately does not exist before the first paid run.
              Path("input-data").mkdir(parents=True, exist_ok=True)
          PY
      - name: overlay recent un-compacted paid ledgers
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/assemble_price_artifacts.sh 48 input-data paid
      - name: stage only spend history into the immutable execution directory
        run: |
          mkdir -p plan-data/curated
          if [ -d input-data/curated/paid_spend_ledger ]; then
            cp -R input-data/curated/paid_spend_ledger plan-data/curated/
          fi
      - name: freeze public candidates, benchmark ids, and assignments
        env:
          ORCAP_PRICE_MODELS: ${{ vars.ORCAP_MARKET_MEASUREMENT_MODELS }}
          ORCAP_MARKET_MEASUREMENT_RUN_ID: github-${{ github.run_id }}
          ORCAP_MARKET_MEASUREMENT_SEED: ${{ github.run_id }}
        run: >-
          uv run python -m orcap.capture_market_measurement plan
          --bundle market-measurement-plan.json
          --curated-dir plan-data/curated
      - name: upload immutable assignment-only plan
        uses: actions/upload-artifact@v4
        with:
          name: market-measurement-plan-${{ github.run_id }}
          path: |
            market-measurement-plan.json
            plan-data/
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
          overwrite: true
      - name: validate source health, manifest, and nonempty assignment plan
        run: >-
          uv run python -m orcap.capture_market_measurement validate-plan
          --bundle market-measurement-plan.json
          --require-tasks

  execute:
    needs: plan
    if: >-
      ${{ vars.ORCAP_PAID_PRICE_STUDIES_ENABLED == 'true' &&
          vars.ORCAP_MARKET_MEASUREMENT_ENABLED == 'true' &&
          (github.event_name == 'schedule' || github.event.inputs.execute_paid == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - uses: actions/download-artifact@v4
        with:
          name: market-measurement-plan-${{ github.run_id }}
      - name: recover prior checkpoint from a retried execution job
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p prior-execution plan-data/curated/paid_spend_ledger
          gh run download "${{ github.run_id }}" \
            --pattern "market-measurement-execution-${{ github.run_id }}-*" \
            --dir prior-execution || true
          find prior-execution -type d -name paid_spend_ledger -print0 | \
            while IFS= read -r -d '' ledger; do
              cp -R "$ledger"/. plan-data/curated/paid_spend_ledger/
            done
      - name: verify uploaded plan and execute exactly once
        env:
          OPENROUTER_PRICE_EXPERIMENT_KEY: ${{ secrets.OPENROUTER_PRICE_EXPERIMENT_KEY }}
          ORCAP_PAID_PRICE_STUDIES_ENABLED: ${{ vars.ORCAP_PAID_PRICE_STUDIES_ENABLED }}
          ORCAP_MARKET_MEASUREMENT_ENABLED: ${{ vars.ORCAP_MARKET_MEASUREMENT_ENABLED }}
          ORCAP_MARKET_MEASUREMENT_START_UTC: ${{ vars.ORCAP_MARKET_MEASUREMENT_START_UTC }}
          ORCAP_MARKET_MEASUREMENT_END_UTC: ${{ vars.ORCAP_MARKET_MEASUREMENT_END_UTC }}
          ORCAP_MARKET_MEASUREMENT_MAX_RUN_USD: ${{ vars.ORCAP_MARKET_MEASUREMENT_MAX_RUN_USD || '0.50' }}
          ORCAP_MARKET_MEASUREMENT_MAX_DAY_USD: ${{ vars.ORCAP_MARKET_MEASUREMENT_MAX_DAY_USD || '3.00' }}
          ORCAP_MARKET_MEASUREMENT_MAX_CAMPAIGN_USD: ${{ vars.ORCAP_MARKET_MEASUREMENT_MAX_CAMPAIGN_USD || '20.00' }}
        run: >-
          uv run python -m orcap.capture_market_measurement execute
          --bundle market-measurement-plan.json
          --curated-dir plan-data/curated
      - name: preserve redacted checkpoints, grades, and spend ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-measurement-execution-${{ github.run_id }}-${{ github.run_attempt }}
          path: plan-data/
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0
