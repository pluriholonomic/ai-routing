name: memo
# Nightly: rerun the full empirical screen (H1-H19) against the accumulated
# panel and render the memo. Results land in the private HF dataset under
# analysis/ and reports/memo.html; a local scheduled job redeploys the HTML
# to the claude.ai artifact (artifact publishing requires a user session).

on:
  schedule:
    - cron: "3 5 * * *"  # after the 03:17 scrape and 01:43 compact
  workflow_dispatch:

concurrency:
  group: memo
  cancel-in-progress: false

jobs:
  memo:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: hydrate dataset (one bulk download beats thousands of hf:// reads)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run hf download t4run/openrouter-market-history --repo-type dataset \
            --include "curated/*" "derived/*" "external/*" "backfill/*" "data-static/*" \
            --local-dir data
      - name: reanalyze
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ORCAP_ANALYSIS_SOURCE: local
        run: uv run orcap analyze
      - name: render memo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ORCAP_ANALYSIS_SOURCE: local
        run: uv run orcap memo
      - name: push analysis + memo to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ORCAP_DATA_DIR: pushdata  # clean staging dir — data/ holds the hydrated mirror
        run: |
          mkdir -p pushdata/analysis pushdata/reports
          cp analysis/*.parquet analysis/*.json pushdata/analysis/
          cp analysis/memo.html pushdata/reports/memo.html
          uv run orcap push --message "nightly reanalysis + memo ${{ github.run_id }}" --delete-local
      - name: publish memo to private HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          HfApi(token=os.environ["HF_TOKEN"]).upload_file(
              path_or_fileobj="analysis/memo.html", path_in_repo="index.html",
              repo_id="t4run/openrouter-memo", repo_type="space",
              commit_message="daily memo refresh")
          EOF
