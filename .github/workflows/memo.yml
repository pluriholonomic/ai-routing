name: memo
# Nightly: rerun the full empirical screen (H1-H19) against the accumulated
# panel and render the memo. Results land in the private HF dataset under
# analysis/ and reports/memo.html and are published to the private HF Space.
# Any separate local artifact copy is optional and not part of data durability.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/memo.yml"
  workflow_run:
    workflows: ["compact"]
    types: [completed]
  schedule:
    - cron: "13 5 * * *"  # after the 03:17 scrape and 04:13 compact
  workflow_dispatch:

concurrency:
  # Failed/cancelled compact completions create intentionally skipped workflow
  # runs. Give those unique groups so they cannot cancel a useful scheduled or
  # successful chained memo before the job-level condition is evaluated.
  group: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' && format('memo-skipped-{0}', github.run_id) || 'memo' }}
  # Capture/compact can finish while a bounded Hub hydration is waiting for a
  # rate-limit reset. Queue the newer trigger: cancelling here discards the
  # job-local cache and can starve publication under frequent compact events.
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  memo:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 420
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --no-dev
      - name: detect verified legacy source-run baseline
        id: legacy-source-baseline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python - <<'PY'
          import os
          from huggingface_hub import HfApi
          exists = HfApi(token=os.environ["HF_TOKEN"]).file_exists(
              "t4run/openrouter-market-history",
              "curated/source_runs/dt=legacy/baseline.parquet",
              repo_type="dataset",
          )
          with open(os.environ["GITHUB_OUTPUT"], "a") as output:
              output.write(f"exists={str(exists).lower()}\n")
          PY
      - name: hydrate source-run ledger for 2026-07-10
        # Legacy captures predate daily bundling and contain thousands of tiny
        # immutable objects. Hydrate the known high-cardinality dates in
        # separate bounded steps while sharing the same Hub cache.
        if: ${{ steps.legacy-source-baseline.outputs.exists != 'true' }}
        timeout-minutes: 75
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_XET_HIGH_PERFORMANCE: "1"
        run: |
          uv run python - <<'PY'
          import shutil
          from huggingface_hub import snapshot_download
          snapshot = snapshot_download(
              "t4run/openrouter-market-history", repo_type="dataset",
              cache_dir=".hf-cache",
              allow_patterns=["curated/source_runs/dt=2026-07-10/*"],
              max_workers=32,
          )
          shutil.copytree(snapshot, "data", dirs_exist_ok=True)
          PY
      - name: hydrate source-run ledger for 2026-07-11
        if: ${{ steps.legacy-source-baseline.outputs.exists != 'true' }}
        timeout-minutes: 75
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_XET: "1"
        run: |
          uv run python - <<'PY'
          import shutil
          from huggingface_hub import snapshot_download
          for hour in range(24):
              print(f"hydrating legacy source ledger hour {hour:02d}", flush=True)
              snapshot = snapshot_download(
                  "t4run/openrouter-market-history", repo_type="dataset",
                  cache_dir=".hf-cache",
                  allow_patterns=[
                      f"curated/source_runs/dt=2026-07-11/20260711T{hour:02d}*",
                  ],
                  max_workers=16,
              )
              shutil.copytree(snapshot, "data", dirs_exist_ok=True)
          PY
      - name: hydrate source-run ledger for 2026-07-12 hours 00-05
        # This legacy date is also the partition that exceeded the compaction
        # guard. Its timestamped filenames let us bound each migration window
        # without dropping or sampling any ledger rows.
        if: ${{ steps.legacy-source-baseline.outputs.exists != 'true' }}
        timeout-minutes: 30
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_XET: "1"
        run: |
          uv run python - <<'PY'
          import shutil
          from huggingface_hub import snapshot_download
          for hour in range(0, 6):
              print(f"hydrating legacy source ledger hour {hour:02d}", flush=True)
              snapshot = snapshot_download(
                  "t4run/openrouter-market-history", repo_type="dataset",
                  cache_dir=".hf-cache",
                  allow_patterns=[
                      f"curated/source_runs/dt=2026-07-12/20260712T{hour:02d}*",
                  ],
                  max_workers=16,
              )
              shutil.copytree(snapshot, "data", dirs_exist_ok=True)
          PY
      - name: hydrate source-run ledger for 2026-07-12 hours 06-11
        if: ${{ steps.legacy-source-baseline.outputs.exists != 'true' }}
        timeout-minutes: 30
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_XET: "1"
        run: |
          uv run python - <<'PY'
          import shutil
          from huggingface_hub import snapshot_download
          for hour in range(6, 12):
              print(f"hydrating legacy source ledger hour {hour:02d}", flush=True)
              snapshot = snapshot_download(
                  "t4run/openrouter-market-history", repo_type="dataset",
                  cache_dir=".hf-cache",
                  allow_patterns=[
                      f"curated/source_runs/dt=2026-07-12/20260712T{hour:02d}*",
                  ],
                  max_workers=16,
              )
              shutil.copytree(snapshot, "data", dirs_exist_ok=True)
          PY
      - name: hydrate source-run ledger for 2026-07-12 hours 12-17
        if: ${{ steps.legacy-source-baseline.outputs.exists != 'true' }}
        timeout-minutes: 30
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # The legacy rows are tiny LFS objects. This specific window leaves
          # Xet workers in a long tail; direct HTTP is faster and deterministic.
          HF_HUB_DISABLE_XET: "1"
        run: |
          uv run python - <<'PY'
          import shutil
          from huggingface_hub import snapshot_download
          for hour in range(12, 18):
              print(f"hydrating legacy source ledger hour {hour:02d}", flush=True)
              snapshot = snapshot_download(
                  "t4run/openrouter-market-history", repo_type="dataset",
                  cache_dir=".hf-cache",
                  allow_patterns=[
                      f"curated/source_runs/dt=2026-07-12/20260712T{hour:02d}*",
                  ],
                  max_workers=16,
              )
              shutil.copytree(snapshot, "data", dirs_exist_ok=True)
          PY
      - name: hydrate source-run ledger for 2026-07-12 hours 18-23
        if: ${{ steps.legacy-source-baseline.outputs.exists != 'true' }}
        timeout-minutes: 30
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_XET: "1"
        run: |
          uv run python - <<'PY'
          import shutil
          from huggingface_hub import snapshot_download
          for hour in range(18, 24):
              print(f"hydrating legacy source ledger hour {hour:02d}", flush=True)
              snapshot = snapshot_download(
                  "t4run/openrouter-market-history", repo_type="dataset",
                  cache_dir=".hf-cache",
                  allow_patterns=[
                      f"curated/source_runs/dt=2026-07-12/20260712T{hour:02d}*",
                  ],
                  max_workers=16,
              )
              shutil.copytree(snapshot, "data", dirs_exist_ok=True)
          PY
      - name: hydrate source-run ledger for 2026-07-13
        if: ${{ steps.legacy-source-baseline.outputs.exists != 'true' }}
        timeout-minutes: 75
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_XET: "1"
        run: |
          uv run python - <<'PY'
          import shutil
          from huggingface_hub import snapshot_download
          for hour in range(24):
              print(f"hydrating legacy source ledger hour {hour:02d}", flush=True)
              snapshot = snapshot_download(
                  "t4run/openrouter-market-history", repo_type="dataset",
                  cache_dir=".hf-cache",
                  allow_patterns=[
                      f"curated/source_runs/dt=2026-07-13/20260713T{hour:02d}*",
                  ],
                  max_workers=16,
              )
              shutil.copytree(snapshot, "data", dirs_exist_ok=True)
          PY
      - name: hydrate bundled and future source-run ledger
        timeout-minutes: 75
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_XET_HIGH_PERFORMANCE: "1"
        run: |
          uv run python - <<'PY'
          import shutil
          from huggingface_hub import snapshot_download
          snapshot = snapshot_download(
              "t4run/openrouter-market-history", repo_type="dataset",
              cache_dir=".hf-cache",
              allow_patterns=["curated/source_runs/*"],
              ignore_patterns=[
                  "curated/source_runs/dt=2026-07-10/*",
                  "curated/source_runs/dt=2026-07-11/*",
                  "curated/source_runs/dt=2026-07-12/*",
                  "curated/source_runs/dt=2026-07-13/*",
              ],
              max_workers=32,
          )
          shutil.copytree(snapshot, "data", dirs_exist_ok=True)
          PY
      - name: materialize verified legacy source-run baseline once
        if: ${{ steps.legacy-source-baseline.outputs.exists != 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python scripts/materialize_source_runs_baseline.py \
            --expect-source-files 1566 --expect-rows 1660
      - name: hydrate remaining analysis mirror through the robust Hub cache
        timeout-minutes: 75
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_XET_HIGH_PERFORMANCE: "1"
        run: |
          uv run python - <<'PY'
          import shutil
          from huggingface_hub import snapshot_download
          snapshot = snapshot_download(
              "t4run/openrouter-market-history", repo_type="dataset",
              cache_dir=".hf-cache",
              allow_patterns=["curated/*", "derived/*", "external/*", "backfill/*"],
              ignore_patterns=["curated/source_runs/*"],
              max_workers=32,
          )
          shutil.copytree(snapshot, "data", dirs_exist_ok=True)
          PY
      - name: overlay fresh intraday buffers
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/assemble_artifacts.sh 26 data
      - name: report source health (non-blocking for publication)
        # red sources warn in the log; the memo still publishes with stale data
        # rather than not at all. Strict gating lives in the capture jobs, which
        # validate the ledger rows they just wrote.
        continue-on-error: true
        run: uv run orcap quality --profile core
      - name: reanalyze
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ORCAP_ANALYSIS_SOURCE: local
        run: uv run orcap analyze
      - name: render memo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ORCAP_ANALYSIS_SOURCE: local
        run: uv run orcap memo
      - name: push analysis + memo to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ORCAP_DATA_DIR: pushdata  # clean staging dir — data/ holds the hydrated mirror
        run: |
          mkdir -p pushdata/analysis pushdata/reports
          cp analysis/*.parquet analysis/*.json pushdata/analysis/
          cp analysis/memo.html pushdata/reports/memo.html
          uv run orcap push --message "nightly reanalysis + memo ${{ github.run_id }}" --delete-local
      - name: publish memo to private HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          HfApi(token=os.environ["HF_TOKEN"]).upload_file(
              path_or_fileobj="analysis/memo.html", path_in_repo="index.html",
              repo_id="t4run/openrouter-memo", repo_type="space",
              commit_message="daily memo refresh")
          EOF
