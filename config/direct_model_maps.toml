# Chutes appends a product/TEE suffix to the public API id. These mappings
# require both the catalog's literal ``root`` and ``quantization`` to match the
# versioned evidence below; no display-name or string-similarity mapping is used.
[maps.chutes_qwen36_27b]
provider = "chutes"
direct_provider_model_id = "Qwen/Qwen3.6-27B-TEE"
canonical_model_id = "qwen/qwen3.6-27b"
mapping_type = "verified_provider_configuration_pair_v1"
expected_root = "Qwen/Qwen3.6-27B-FP8"
expected_quantization = "fp8"
direct_source_url = "https://llm.chutes.ai/v1/models"
router_evidence_url = "https://openrouter.ai/api/v1/models/qwen/qwen3.6-27b/endpoints"

