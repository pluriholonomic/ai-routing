# Prospective H94 design, frozen before the first longitudinal router-catalog
# price transition was observed. Readiness permits estimation; it is not a
# positive result.

[population]
eligible_after_utc = "2026-07-17T04:30:20Z"
require_unique_official_model_suffix = true
require_hugging_face_link = true
require_same_normalized_provider = true
minimum_routers_per_commodity = 2

[event]
maximum_adjacent_capture_gap_hours = 2.5
exact_component_price_atol = 1e-12
exact_component_price_rtol = 1e-12
common_shock_window_minutes = 90.0
simultaneous_tie_window_minutes = 1.0
material_wedge_percent = 1.0

[promotion]
minimum_elapsed_days = 7.0
minimum_snapshots_per_router = 48
minimum_price_transitions = 30
minimum_matched_common_shocks = 15
minimum_independent_provider_models = 10

[allocation_consequence]
minimum_linked_simulated_route_switches = 15
window_minutes = 90.0

[inference]
cluster = "provider_model"
placebo = "within-router circular capture-time shift"
placebo_minimum_snapshots = 8
bootstrap_draws = 5000
seed = 20260717
familywise_method = "holm"
